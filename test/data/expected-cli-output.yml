lowatt-enedis cmdHisto --help: |
  usage: lowatt-enedis cmdHisto [-h] --login LOGIN --contrat CONTRAT [--pas {10,30}] [--denomination DENOMINATION] [--nom NOM] [--prenom PRENOM] [--civilite {M,Mme}] [--no-autorisation] [--naf NAF] [--secteur SECTEUR] [--siret SIRET] [--from FROM] [--to TO] [--corrigee] --cert-file CERT_FILE --key-file KEY_FILE [--homologation] [--output {xml,json}] prm {IDX,CDC}

