lowatt-enedis --help: |
  usage: lowatt-enedis [-h] {search,technical,measures,details,detailsV3,cmdHisto,cmdAcces,cmdInfraJ,subscribe,subscriptions,unsubscribe,cmdHistoFine,cmdHistoFact,cmdTechnical,cmdServicesAccesDonnees,cmdArretServiceAccesDonnees,wsdl,decrypt} ...

  CLI access to Enedis SGE web-services.

  positional arguments:
    {search,technical,measures,details,detailsV3,cmdHisto,cmdAcces,cmdInfraJ,subscribe,subscriptions,unsubscribe,cmdHistoFine,cmdHistoFact,cmdTechnical,cmdServicesAccesDonnees,cmdArretServiceAccesDonnees,wsdl,decrypt}
      search              Query the "RecherchePoint-v2.0" web-service.
      technical           Query the "ConsultationDonneesTechniquesContractuelles-v1.0" web-service.
      measures            Query the "ConsultationMesures-v1.1" web-service.
      details             Query the "ConsultationMesuresDetaillees-v2.0" web-service.
      detailsV3           Query the "ConsultationMesuresDetaillees-v3.0" web-service.
      cmdHisto            Query the "CommandeTransmissionHistoriqueMesures-v1.0" web-service.
      cmdAcces            Query the "CommanderAccesDonneesMesures-V1.0" web-service.
      cmdInfraJ           Query the "CommandeTransmissionDonneesInfraJ-v1.0" web-service.
      subscribe           Query the "CommandeCollectePublicationMesures-v3.0" web-service.
      subscriptions       Query the "RechercherServicesSouscritsMesures-v1.0" web-service.
      unsubscribe         Query the "CommandeArretServiceSouscritMesures-v1.0" web-service.
      cmdHistoFine        Query the "B2B_M023MFI" web-service.
      cmdHistoFact        Query the "B2B_M023MFA" web-service.
      cmdTechnical        Query the "B2B_M023ITC" web-service.
      cmdServicesAccesDonnees
                          Query the "CommanderServicesAccesDonnees-V1.0" web-service.
      cmdArretServiceAccesDonnees
                          Query the "CommanderArretServicesAccesDonnees-V1.0" web-service.
      wsdl                Display WSDL information about some ws command.
      decrypt             Decrypt AES-128-CBC enedis files

  options:
    -h, --help            show this help message and exit
lowatt-enedis cmdAcces --help: |
  usage: lowatt-enedis cmdAcces [-h] --login LOGIN --contrat CONTRAT [--from FROM] [--to TO] [--injection] [--denomination DENOMINATION] [--nom NOM] [--prenom PRENOM] [--civilite {M,Mme}] [--no-autorisation] --cert-file CERT_FILE --key-file KEY_FILE [--homologation] [--output {xml,json}] prm {ENERGIE,PMAX,COURBE,INDEX}

  positional arguments:
    prm                   identifiant PRM du point
    {ENERGIE,PMAX,COURBE,INDEX}
                          type de mesure demandé : ENERGIE pour les consommations globales quotidiennes, PMAX pour les puissances maximales quotidiennes, COURBE pour la courbe de charge.

  options:
    -h, --help            show this help message and exit
    --login LOGIN         User login. Default to ENEDIS_LOGIN environment variable.
    --contrat CONTRAT     identifiant du contrat entre le demandeur et Enedis. Default to ENEDIS_CONTRAT environment variable.
    --from FROM           date de début souhaitée (incluse)
    --to TO               date de fin souhaitée (excluse)
    --injection           demander les données en injection (soutirage par défaut).
    --denomination DENOMINATION
                          Dénomination sociale de la personne morale ayant donné son accord
    --nom NOM             Nom de la personne physique ou nom commerciale de la personne morale ayant donné son accord
    --prenom PRENOM       Prénom de la personne physique
    --civilite {M,Mme}    Civilité de la personne physique
    --no-autorisation     demander sans l'autorisation du client (pour l'homologation seulement)
    --cert-file CERT_FILE
                          Client certificate file. Default to ENEDIS_CERT_FILE environment variable.
    --key-file KEY_FILE   Client private key file. Default to ENEDIS_KEY_FILE environment variable.
    --homologation        Change service host to use homologation sandbox. Enabled by presence of ENEDIS_HOMOLOGATION in environment variables.
    --output {xml,json}   Output type. Default is xml
