lowatt-enedis subscribe --help: |
  usage: lowatt-enedis subscribe [-h] --login LOGIN --contrat CONTRAT [--cdc-enable] [--cdc] [--idx] [--period {daily,weekly,monthly}] [--injection] [--linky] [--denomination DENOMINATION] [--nom NOM] [--prenom PRENOM] [--civilite {M,Mme}] [--no-autorisation] [--from FROM] [--to TO] [--corrigee] --cert-file CERT_FILE --key-file KEY_FILE [--homologation] [--output {xml,json}] prm

  positional arguments:
    prm                   identifiant PRM du point

  options:
    -h, --help            show this help message and exit
    --login LOGIN         User login. Default to ENEDIS_LOGIN environment variable.
    --contrat CONTRAT     identifiant du contrat entre le demandeur et Enedis. Default to ENEDIS_CONTRAT environment variable.
    --cdc-enable          demander la collecte de la courbe de charge.
    --cdc                 demander la transmission données les courbes de charge.
    --idx                 demander la transmission des données d'index index et autres données du compteur.
    --period {daily,weekly,monthly}
                          périodicité de réception pour la courbe de charge (quotidienne par défaut).
    --injection           demander les données en injection (soutirage par défaut).
    --linky               la demande concerne le segment C5 ou P4(segment C1-C4 ou P1-P3 par défaut).
    --denomination DENOMINATION
                          Dénomination sociale de la personne morale ayant donné son accord
    --nom NOM             Nom de la personne physique ou nom commerciale de la personne morale ayant donné son accord
    --prenom PRENOM       Prénom de la personne physique
    --civilite {M,Mme}    Civilité de la personne physique
    --no-autorisation     demander sans l'autorisation du client (pour l'homologation seulement)
    --from FROM           date de début, postérieure ou égale à la date du jour
    --to TO               date de fin souhaitée, supérieure à la date de fin précédente lors d'un renouvellement, un an max pour les compteurs linky
    --corrigee            obtenir les mesures corrigées (C1-C4 uniquement)
    --cert-file CERT_FILE
                          Client certificate file. Default to ENEDIS_CERT_FILE environment variable.
    --key-file KEY_FILE   Client private key file. Default to ENEDIS_KEY_FILE environment variable.
    --homologation        Change service host to use homologation sandbox. Enabled by presence of ENEDIS_HOMOLOGATION in environment variables.
    --output {xml,json}   Output type. Default is xml
